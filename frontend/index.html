<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>CFAC</title> <!--Titulo-->
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    
    <!--Importación de estilos--> 
    <link rel="website icon" type="png" href="../assets/img/CFAC.png" />
    <link rel="stylesheet" href="./assets/css/style-dash.css">
    <link rel="stylesheet" href="./assets/toastr/toastr.min.css">

</head>

<body class="bg-gradient-primary">
    <div class="container">
        <!-- Tarjeta -->
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <!-- Fila agregada dentro de la tarjeta -->
                        <div class="row">
                            <div class="col-lg-6 imagen">
                                <img src="assets/img/Cfac_login.png">
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center text-uppercase">
                                        <h1 class="h4 text-gray-900 mb-4">Bienvenido</h1>
                                    </div>
                                    <!--INICIO DEL FORMULARIO DE INICIO DE SESIÓN-->
                                    <form class="user">
                                        <div class="form-group">
                                            <input type="text" class="form-control form-control-user"
                                                id="User"
                                                placeholder="Ingresa tu nombre de usuario..." required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user"
                                                id="Password" placeholder="Contraseña" required>
                                        </div>
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox small">
                                                <input type="checkbox" class="custom-control-input" id="customCheck">
                                                <label class="custom-control-label" for="customCheck">Recuérdame</label>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-user btn-block">
                                            Ingresar
                                        </button>
                                    </form>
                                    <hr>
                                    <div class="mb-2 text-center">
                                        <a class="small" href="/pages/forgot-password.html">¿Olvidó su contraseña?</a>
                                    </div>
                                    <div class="text-center">
                                        <a class="small" href="/pages/create-account.html">Crear una cuenta</a>
                                    </div>
                                </div>
                                <!--FIN DEL FORMULARIO DE INICIO DE SESIÓN-->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.io client library -->
    <script src="../config/enviroment.js"></script>
    
    <!-- Importar el archivo JavaScript de autenticación -->
    <script type="module" src="assets/js/login/login.js"></script>
</body>
    
</html>
